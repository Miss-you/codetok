version: "2"

linters:
  enable:
    - misspell
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/miss-you/codetok
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
